<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" width="1440" height="800">
  <defs>
    <!-- Base dark background -->
    <radialGradient id="bgGlow1" cx="20%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1a2e1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06060a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0d1f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06060a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06C167" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06C167" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenSpot2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06C167" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06C167" stop-opacity="0"/>
    </radialGradient>
    <!-- Noise texture filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur10">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blur30">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#06C167" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <!-- Dot pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#06C167" opacity="0.12"/>
    </pattern>
    <clipPath id="clip">
      <rect width="1440" height="800"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base background -->
    <rect width="1440" height="800" fill="#07080a"/>
    <rect width="1440" height="800" fill="url(#bgGlow1)"/>
    <rect width="1440" height="800" fill="url(#bgGlow2)"/>

    <!-- Grid overlay -->
    <rect width="1440" height="800" fill="url(#grid)"/>

    <!-- Green atmospheric glow - bottom left -->
    <ellipse cx="180" cy="620" rx="400" ry="300" fill="url(#greenSpot)" filter="url(#blur30)"/>
    <!-- Green atmospheric glow - top right -->
    <ellipse cx="1280" cy="160" rx="350" ry="250" fill="url(#greenSpot2)" filter="url(#blur30)"/>
    <!-- Subtle center glow -->
    <ellipse cx="720" cy="400" rx="500" ry="350" fill="#06C167" opacity="0.04" filter="url(#blur30)"/>

    <!-- Abstract food shapes - burger layers left side -->
    <g transform="translate(120, 320)" opacity="0.85">
      <!-- Bun top -->
      <ellipse cx="0" cy="-80" rx="110" ry="65" fill="#c8622a" opacity="0.9"/>
      <ellipse cx="0" cy="-88" rx="95" ry="40" fill="#e07030" opacity="0.7"/>
      <!-- Sesame seeds -->
      <ellipse cx="-30" cy="-98" rx="8" ry="4" fill="#f5d08a" opacity="0.8" transform="rotate(-20,-30,-98)"/>
      <ellipse cx="20" cy="-104" rx="7" ry="3.5" fill="#f5d08a" opacity="0.8" transform="rotate(10,20,-104)"/>
      <ellipse cx="-5" cy="-108" rx="6" ry="3" fill="#f5d08a" opacity="0.7" transform="rotate(5,-5,-108)"/>
      <!-- Lettuce -->
      <path d="M -115,-55 Q -80,-30 -50,-50 Q -20,-70 10,-50 Q 40,-30 70,-52 Q 90,-65 115,-55" fill="none" stroke="#3eb83e" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
      <!-- Cheese -->
      <rect x="-105" y="-38" width="210" height="18" rx="2" fill="#f5b800" opacity="0.85"/>
      <polygon points="-105,-38 -120,-25 -105,-20" fill="#f5b800" opacity="0.85"/>
      <polygon points="105,-38 120,-25 105,-20" fill="#f5b800" opacity="0.85"/>
      <!-- Patty -->
      <ellipse cx="0" cy="-8" rx="108" ry="30" fill="#5c2e0e" opacity="0.95"/>
      <ellipse cx="-20" cy="-14" rx="30" ry="8" fill="#7a3a12" opacity="0.5"/>
      <ellipse cx="30" cy="-5" rx="25" ry="7" fill="#7a3a12" opacity="0.4"/>
      <!-- Tomato -->
      <ellipse cx="0" cy="28" rx="100" ry="18" fill="#d93e2e" opacity="0.85"/>
      <!-- Bun bottom -->
      <ellipse cx="0" cy="56" rx="112" ry="30" fill="#c8622a" opacity="0.9"/>
    </g>

    <!-- Abstract noodle bowl right side -->
    <g transform="translate(1310, 420)" opacity="0.8">
      <!-- Bowl -->
      <path d="M -140,0 Q -130,100 0,120 Q 130,100 140,0 Z" fill="#d4a050" opacity="0.7"/>
      <path d="M -140,0 Q -130,90 0,108 Q 130,90 140,0 Z" fill="#e8b860" opacity="0.5"/>
      <!-- Bowl rim -->
      <ellipse cx="0" cy="0" rx="140" ry="30" fill="#c89040" opacity="0.8"/>
      <ellipse cx="0" cy="0" rx="130" ry="24" fill="#f0c870" opacity="0.6"/>
      <!-- Noodles -->
      <path d="M -80,-20 Q -40,20 0,-10 Q 40,-40 80,-15" fill="none" stroke="#f5e4a0" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
      <path d="M -90,5 Q -50,40 -10,15 Q 30,-10 70,10" fill="none" stroke="#f5e4a0" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
      <path d="M -70,-5 Q -20,35 20,10 Q 60,-15 90,5" fill="none" stroke="#eedca0" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
      <!-- Egg half -->
      <ellipse cx="-40" cy="-5" rx="30" ry="22" fill="#f5e8c0" opacity="0.9"/>
      <ellipse cx="-40" cy="-5" rx="16" ry="12" fill="#f5a820" opacity="0.85"/>
      <!-- Green onion -->
      <path d="M 30,-30 Q 45,10 35,40" fill="none" stroke="#5ab840" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
      <path d="M 50,-20 Q 55,20 48,45" fill="none" stroke="#5ab840" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <!-- Steam lines -->
      <path d="M -20,-50 Q -10,-80 -20,-110" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
      <path d="M 10,-45 Q 22,-75 12,-105" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
      <path d="M 40,-40 Q 50,-70 42,-98" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    </g>

    <!-- Pizza slice - upper left area -->
    <g transform="translate(380, 130) rotate(-15)" opacity="0.7">
      <!-- Crust -->
      <path d="M 0,0 L -90,160 Q 0,195 90,160 Z" fill="#e8a040" opacity="0.9"/>
      <path d="M -10,10 L -80,155 Q 0,180 80,155 L 10,10 Z" fill="#d44820" opacity="0.85"/>
      <!-- Cheese -->
      <path d="M -8,12 L -75,152 Q 0,172 75,152 L 8,12 Z" fill="#f5d060" opacity="0.8"/>
      <!-- Pepperoni -->
      <circle cx="0" cy="70" r="18" fill="#b83020" opacity="0.9"/>
      <circle cx="-28" cy="110" r="15" fill="#b83020" opacity="0.9"/>
      <circle cx="30" cy="108" r="15" fill="#b83020" opacity="0.85"/>
      <circle cx="0" cy="140" r="12" fill="#b83020" opacity="0.7"/>
    </g>

    <!-- Sushi pieces - bottom right area -->
    <g transform="translate(960, 660)" opacity="0.75">
      <!-- Roll 1 -->
      <g transform="translate(-80, 0)">
        <ellipse cx="0" cy="0" rx="32" ry="35" fill="#1a1a1a" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="26" ry="29" fill="#f8f0e0" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="16" ry="18" fill="#d93e2e" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="8" ry="9" fill="#f5a820" opacity="0.8"/>
        <rect x="-32" y="-6" width="64" height="12" rx="3" fill="#1a4a1a" opacity="0.9"/>
      </g>
      <!-- Roll 2 -->
      <g transform="translate(0, -15)">
        <ellipse cx="0" cy="0" rx="32" ry="35" fill="#1a1a1a" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="26" ry="29" fill="#f8f0e0" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="16" ry="18" fill="#2a7a4a" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="8" ry="9" fill="#f0f8e0" opacity="0.8"/>
        <rect x="-32" y="-6" width="64" height="12" rx="3" fill="#1a4a1a" opacity="0.9"/>
      </g>
      <!-- Roll 3 -->
      <g transform="translate(80, 5)">
        <ellipse cx="0" cy="0" rx="32" ry="35" fill="#1a1a1a" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="26" ry="29" fill="#f8f0e0" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="16" ry="18" fill="#ff6040" opacity="0.9"/>
        <ellipse cx="0" cy="0" rx="8" ry="9" fill="#fff0c0" opacity="0.8"/>
        <rect x="-32" y="-6" width="64" height="12" rx="3" fill="#1a4a1a" opacity="0.9"/>
      </g>
      <!-- Wasabi blob -->
      <ellipse cx="160" cy="20" rx="22" ry="14" fill="#6ab840" opacity="0.8"/>
      <!-- Ginger slices -->
      <ellipse cx="200" cy="-10" rx="18" ry="10" fill="#f0a090" opacity="0.7" transform="rotate(-20,200,-10)"/>
      <ellipse cx="215" cy="8" rx="16" ry="9" fill="#f0a090" opacity="0.6" transform="rotate(10,215,8)"/>
    </g>

    <!-- Floating sparkle dots - scattered -->
    <circle cx="550" cy="180" r="3" fill="#06C167" opacity="0.7"/>
    <circle cx="580" cy="200" r="1.5" fill="#06C167" opacity="0.5"/>
    <circle cx="870" cy="120" r="2.5" fill="#06C167" opacity="0.6"/>
    <circle cx="1050" cy="280" r="2" fill="#06C167" opacity="0.5"/>
    <circle cx="340" cy="450" r="3" fill="#06C167" opacity="0.5"/>
    <circle cx="1150" cy="520" r="2" fill="#06C167" opacity="0.4"/>
    <circle cx="680" cy="680" r="2.5" fill="#06C167" opacity="0.5"/>
    <circle cx="760" cy="150" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="1200" cy="350" r="2" fill="white" opacity="0.2"/>
    <circle cx="450" cy="600" r="1.5" fill="white" opacity="0.25"/>

    <!-- Uber Eats green accent lines -->
    <line x1="0" y1="795" x2="1440" y2="795" stroke="#06C167" stroke-width="3" opacity="0.4"/>
    <line x1="0" y1="790" x2="600" y2="790" stroke="#06C167" stroke-width="1" opacity="0.2"/>

    <!-- Top subtle green strip -->
    <rect x="0" y="0" width="1440" height="2" fill="#06C167" opacity="0.3"/>

    <!-- Noise grain overlay -->
    <rect width="1440" height="800" fill="url(#dots)" opacity="0.5"/>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <rect width="1440" height="800" fill="url(#vignette)"/>
  </g>
</svg>

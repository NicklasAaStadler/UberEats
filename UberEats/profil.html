<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil – UberEats</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/profil.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-venstre">
        <a href="index.html" class="navbar-logo">
          <img src="img/forside/Uber-Eats-Logo-2018.png" alt="UberEats Logo">
        </a>
        <ul>
          <li><a href="index.html">Hjem</a></li>
          <li><a href="#">Restauranter</a></li>
          <li><a href="#">Mine ordrer</a></li>
        </ul>
      </div>

      <ul class="navbar-højre">
        <li><a href="#" id="nav-location">Henter lokation…</a></li>
        <li><a href="kurv.html" class="kurv-icon">
          <i class="fa-solid fa-basket-shopping"></i>
          <span class="kurv-badge" id="kurv-badge"></span>
        </a></li>
        <li id="nav-auth"><a href="login.html" class="login-knap">Log ind</a></li>
      </ul>
    </div>
  </nav>

  <div class="profil-page">

    <!-- Sidebar -->
    <aside class="profil-sidebar">
      <div class="profil-sidebar-bruger">
        <div class="profil-sidebar-avatar" id="sidebar-avatar"></div>
        <div>
          <div class="profil-sidebar-navn" id="sidebar-navn"></div>
          <span class="profil-sidebar-badge" id="sidebar-badge" style="display:none">Studerende</span>
        </div>
      </div>

      <nav class="profil-menu">
        <a href="#" class="profil-menu-item aktiv" data-sektion="oversigt">Oversigt</a>
        <a href="#" class="profil-menu-item" data-sektion="favoritter">Favoritter</a>
        <a href="#" class="profil-menu-item" data-sektion="adresser">Adresser</a>
        <a href="#" class="profil-menu-item" data-sektion="betaling">Betaling</a>
        <a href="#" class="profil-menu-item" data-sektion="studierabat">Studierabat</a>
        <a href="#" class="profil-menu-item" data-sektion="indstillinger">Indstillinger</a>
      </nav>

      <button class="profil-log-ud" onclick="logout()">Log ud</button>
    </aside>

    <!-- Main content -->
    <main class="profil-main" id="profil-main"></main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      const session = await sbGetSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const profile = await sbGetProfile();
      if (!profile) { window.location.href = 'login.html'; return; }

      const displayName = profile.display_name || session.user.email;
      const role        = profile.role || 'user';
      const firstName   = displayName.split(' ')[0];
      const initials    = displayName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const isStudent   = role === 'student';

      document.getElementById('sidebar-avatar').textContent = initials;
      document.getElementById('sidebar-navn').textContent   = displayName;
      if (isStudent) document.getElementById('sidebar-badge').style.display = 'inline-block';

      const orders = await sbGetOrders();

      const now          = new Date();
      const denneMåned   = orders.filter(o => new Date(o.created_at).getMonth() === now.getMonth()).length;
      const formattedOrders = orders.map(o => ({
        img:  o.restaurants?.image || 'img/forside/hero food.png',
        navn: o.restaurants?.name  || 'Restaurant',
        items: (o.order_items || []).map(i => `${i.quantity} × ${i.item_name}`).join(', '),
        tid:  new Date(o.created_at).toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' }),
        pris: `${o.total} kr.`,
        id:   o.restaurant_id,
      }));

      const rabatBar = isStudent ? `
        <div class="student-rabat-bar">
          <div class="student-rabat-top">
            <span class="student-rabat-label">DINE STUDIEFORDELE</span>
            <span class="student-rabat-lokation">Hos restauranter med studierabat</span>
          </div>
          <div class="student-rabat-pct">Spar op til 30%</div>
          <div class="student-rabat-progress"><div class="student-rabat-fill"></div></div>
          <div class="student-rabat-niveau">Aktiv studierabat</div>
        </div>
      ` : '';

      const ordrerHTML = formattedOrders.length === 0
        ? '<p style="color:#888;padding:1rem 0">Du har ikke afgivet nogen ordrer endnu.</p>'
        : formattedOrders.map(o => `
            <div class="ordre-række">
              <img src="${o.img}" alt="${o.navn}" class="ordre-billede">
              <div class="ordre-info">
                <strong>${o.navn}</strong>
                <span>${o.items} · ${o.tid}</span>
              </div>
              <span class="ordre-pris">${o.pris}</span>
              ${o.id ? `<a href="restaurant.html?id=${o.id}" class="ordre-bestil-igen">Bestil igen</a>` : ''}
            </div>
          `).join('');

      document.getElementById('profil-main').innerHTML = `
        <div class="profil-velkommen">
          <h1>Velkommen, ${firstName}</h1>
          <p>${isStudent ? 'Studerende · Verificeret' : session.user.email}</p>
        </div>

        <div class="profil-stats">
          <div class="stat-kort">
            <div class="stat-value">${orders.length}</div>
            <div class="stat-label">Ordrer i alt</div>
            <div class="stat-sub">${denneMåned} denne måned</div>
          </div>
          <div class="stat-kort">
            <div class="stat-value green">${isStudent ? 'Studerende' : 'Normal'}</div>
            <div class="stat-label">Kontotype</div>
            <div class="stat-sub">${session.user.email}</div>
          </div>
        </div>

        ${rabatBar}

        <h2 class="profil-ordrer-titel">Seneste ordrer</h2>
        <div class="profil-ordrer-liste">${ordrerHTML}</div>
      `;

      document.querySelectorAll('.profil-menu-item').forEach(item => {
        item.addEventListener('click', e => {
          e.preventDefault();
          document.querySelectorAll('.profil-menu-item').forEach(i => i.classList.remove('aktiv'));
          item.classList.add('aktiv');
        });
      });
    })();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificer din studiestatus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <h1>Verificer din studiestatus</h1>
      <input type="email" id="username" placeholder="E-mail" autocomplete="username">
      <input type="password" id="password" placeholder="Adgangskode" autocomplete="current-password">
      <input type="text" id="student-id" placeholder="Student ID" autocomplete="off">
      <input type="text" id="university" placeholder="Universitet" autocomplete="off">
      <input type="text" id="study-program" placeholder="Studieretning" autocomplete="off">
      <button onclick="login()">Verificer</button>
      <p class="error-msg" id="error"></p>
      <p class="hint">
        Studerende: <b>student@uni.dk</b> / 1234<br>
        Normal: <b>bruger@mail.dk</b> / 1234
      </p>
    </div>
  </div>
  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        const data = await res.json();
        errorEl.textContent = data.error;
        return;
      }

      const { role, username: name } = await res.json();
      localStorage.setItem('role', role);
      localStorage.setItem('username', name);
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
